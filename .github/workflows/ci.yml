name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (pins Python via .python-version)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --extra dev --locked

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type check (pyright strict)
        run: uv run pyright

      - name: Tests + coverage
        run: uv run pytest --cov=ledger --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  mutation:
    # Mutation testing over the domain (correctness core). Fast — the domain is
    # small — so it gates every push/PR: a weakened domain suite drops the
    # kill-rate below the floor and fails here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (pins Python via .python-version)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --extra dev --locked

      - name: Mutation testing (domain, kill-rate floor)
        run: uv run python scripts/mutation_gate.py 0.75

  chart:
    # Validate the Helm chart on every run (lint + render).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint the chart
        run: helm lint deploy/helm/ledger-py
      - name: Template renders
        run: helm template smoke deploy/helm/ledger-py > /dev/null

  build:
    # Build the production image; push to GHCR on main.
    needs: [gate, mutation]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ledger-py
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # main only: deploy from the runner. helm upgrades the k3s release over an SSH
    # tunnel to the cluster API — the chart comes from this checkout, the image
    # from GHCR. No repo or deploy script lives on the server; the deploy key is
    # restricted to forwarding only 127.0.0.1:6443 (no shell).
    needs: [gate, mutation, chart, build]
    # Skips (not fails) until the server address is configured as a repo variable.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_HOST != ''
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-ledger-py
      cancel-in-progress: false
    environment:
      name: production
      url: https://ledger-py.avelent.work
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Deploy over an SSH tunnel to the cluster
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          printf '%s\n' "$KUBECONFIG_DATA" > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          # Tunnel the k3s API; the key may only forward this one port.
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o ExitOnForwardFailure=yes \
            -f -N -L 6443:127.0.0.1:6443 "${DEPLOY_USER}@${DEPLOY_HOST}"
          export KUBECONFIG="$RUNNER_TEMP/kubeconfig"
          helm upgrade --install ledger-py deploy/helm/ledger-py \
            --reuse-values \
            --set image.repository=ghcr.io/xdrew/ledger-py \
            --set image.tag="sha-${GITHUB_SHA}" \
            --wait --timeout 5m

      - name: Production is serving the new revision
        run: |
          curl -fsS -m 10 https://ledger-py.avelent.work/readyz | jq -e '.status == "ready"'
