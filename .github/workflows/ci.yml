name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (pins Python via .python-version)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync (locked)
        run: uv sync --extra dev --locked

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type check (pyright strict)
        run: uv run pyright

      - name: Tests + coverage
        run: uv run pytest --cov=ledger --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
