apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ledger-py.fullname" . }}-worker
  labels:
    {{- include "ledger-py.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "ledger-py.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "ledger-py.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- include "ledger-py.imagePullSecrets" . | nindent 6 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["ledger-worker"]
          # No HTTP surface: the Temporal worker's liveness is the process itself —
          # if it exits, the container exits and Kubernetes restarts it.
          envFrom:
            {{- include "ledger-py.envFrom" . | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
