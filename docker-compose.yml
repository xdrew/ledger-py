# Local dev stack: Postgres (ledger + temporal), Temporal server + UI, OTel collector, Grafana/Tempo.
# `just up` brings this online; the app (worker + api) runs on the host via uv.
name: ledger-py

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.28
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ledger
      POSTGRES_PWD: ledger
      POSTGRES_SEEDS: postgres
      # temporal auto-setup creates temporal + temporal_visibility databases here
    ports:
      - "7233:7233" # gRPC frontend — the SDK connects here
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8233:8080" # http://localhost:8233 — workflow visibility

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./deploy/otel/collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  tempo:
    image: grafana/tempo:2.7.0
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./deploy/otel/tempo.yaml:/etc/tempo/tempo.yaml:ro

  grafana:
    image: grafana/grafana:11.5.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3001:3000" # http://localhost:3001

volumes:
  pgdata:
