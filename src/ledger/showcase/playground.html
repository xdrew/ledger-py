<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ledger-core · playground</title>
    <style>
      :root {
        --bg: #f7f8fa;
        --card: #ffffff;
        --ink: #1c2530;
        --muted: #667085;
        --line: #e5e8ec;
        --accent: #2f6fed;
        --ok: #1f9d55;
        --warn: #b7791f;
        --err: #d64545;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--card);
      }
      header h1 { margin: 0; font-size: 18px; }
      header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
      main {
        max-width: 960px;
        margin: 24px auto;
        padding: 0 16px;
        display: grid;
        gap: 16px;
        grid-template-columns: 1fr 1fr;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px;
      }
      .card.wide { grid-column: 1 / -1; }
      h2 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
      label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 3px; }
      input, select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 7px;
        font: inherit;
        background: #fff;
        color: var(--ink);
      }
      .row { display: flex; gap: 10px; }
      .row > * { flex: 1; }
      button {
        margin-top: 12px;
        padding: 9px 14px;
        border: 0;
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button.ghost { background: #eef2f9; color: var(--accent); }
      button:active { transform: translateY(1px); }
      pre {
        margin: 12px 0 0;
        padding: 12px;
        background: #0f172a;
        color: #cbd5e1;
        border-radius: 8px;
        font-size: 12px;
        overflow-x: auto;
        max-height: 320px;
      }
      .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
      .s-completed { background: #e3f5ea; color: var(--ok); }
      .s-failed { background: #fbe6e6; color: var(--err); }
      .s-needs_reconciliation { background: #fdf1dd; color: var(--warn); }
      .s-initiated, .s-held, .s-posted { background: #e8eefc; color: var(--accent); }
      .muted { color: var(--muted); font-size: 12px; }
      code { background: #eef2f9; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>ledger-core · playground</h1>
      <p>Event-sourced ledger orchestrated with Temporal — drive the live API.</p>
    </header>
    <main>
      <div class="card wide">
        <h2>Connection</h2>
        <label>API key (X-Api-Key)</label>
        <input id="apiKey" value="dev-local-key" />
        <p class="muted">Transfers start a Temporal workflow; the worker must be running.</p>
      </div>

      <div class="card">
        <h2>1 · Open account</h2>
        <label>Currency</label>
        <input id="currency" value="USD" />
        <button onclick="openAccount()">Open account</button>
        <button class="ghost" onclick="seedPair()">Quick: open source + dest</button>
        <pre id="accountsOut">source: —\ndest:   —</pre>
      </div>

      <div class="card">
        <h2>2 · Deposit</h2>
        <label>Account id</label>
        <input id="depositId" placeholder="account id" />
        <div class="row">
          <div><label>Amount (minor)</label><input id="depositAmt" value="1000" /></div>
          <div><label>Currency</label><input id="depositCur" value="USD" /></div>
        </div>
        <button onclick="deposit()">Deposit</button>
        <pre id="depositOut">—</pre>
      </div>

      <div class="card wide">
        <h2>3 · Transfer (saga)</h2>
        <div class="row">
          <div><label>Source</label><input id="src" placeholder="source account id" /></div>
          <div><label>Destination</label><input id="dst" placeholder="destination account id" /></div>
        </div>
        <div class="row">
          <div><label>Amount (minor)</label><input id="amt" value="400" /></div>
          <div><label>Currency</label><input id="cur" value="USD" /></div>
        </div>
        <button onclick="transfer()">Start transfer</button>
        <span id="status"></span>
        <pre id="transferOut">—</pre>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const headers = () => ({ "Content-Type": "application/json", "X-Api-Key": $("apiKey").value });

      async function api(method, path, body) {
        const res = await fetch(path, { method, headers: headers(), body: body ? JSON.stringify(body) : undefined });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = text; }
        return { ok: res.ok, status: res.status, data };
      }

      async function openAccount() {
        const r = await api("POST", "/api/accounts", { currency: $("currency").value });
        $("accountsOut").textContent = JSON.stringify(r.data, null, 2);
        return r.data.account_id;
      }

      async function seedPair() {
        const cur = $("currency").value;
        const src = (await api("POST", "/api/accounts", { currency: cur })).data.account_id;
        await api("POST", `/api/accounts/${src}/deposit`, { amount: 1000, currency: cur });
        const dst = (await api("POST", "/api/accounts", { currency: cur })).data.account_id;
        $("src").value = src; $("dst").value = dst;
        $("depositId").value = src;
        $("accountsOut").textContent = `source: ${src}  (deposited 1000)\ndest:   ${dst}`;
      }

      async function deposit() {
        const id = $("depositId").value;
        const r = await api("POST", `/api/accounts/${id}/deposit`, {
          amount: Number($("depositAmt").value), currency: $("depositCur").value,
        });
        $("depositOut").textContent = JSON.stringify(r.data, null, 2);
      }

      async function transfer() {
        const r = await api("POST", "/api/transfers", {
          source_account_id: $("src").value,
          destination_account_id: $("dst").value,
          amount: Number($("amt").value),
          currency: $("cur").value,
        });
        const id = r.data.transfer_id;
        if (!id) { $("transferOut").textContent = JSON.stringify(r.data, null, 2); return; }
        poll(id, 0);
      }

      async function poll(id, tries) {
        const r = await api("GET", `/api/transfers/${id}`);
        if (r.ok) {
          const st = r.data.status;
          $("status").innerHTML = ` <span class="pill s-${st}">${st}</span>`;
          $("transferOut").textContent = JSON.stringify(r.data, null, 2);
          const terminal = ["completed", "failed", "needs_reconciliation"].includes(st);
          if (!terminal && tries < 40) return setTimeout(() => poll(id, tries + 1), 250);
        } else if (tries < 40) {
          return setTimeout(() => poll(id, tries + 1), 250);
        }
      }
    </script>
  </body>
</html>
